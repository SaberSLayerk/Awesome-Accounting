<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Awesome Accounting</title>
  <meta name="description" content="Trusted accounting solutions for your business." />
  <link rel="stylesheet" href="contact.css" />
   
</head>

<body>
<header id="siteHeader">
  <div class="container">
    <div class="nav">
      <a class="brand" href="index.html">
        <img src="./Assets/Logo Idea.png" alt="Awesome Accounting Logo" style="width: 100px; height: auto;" />
        <div class="brand-name">Awesome<span> Accounting Inc.</span></div>
      </a>

      <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="primaryNav">
        <span class="barline"></span>
        <span class="barline"></span>
        <span class="barline"></span>
      </button>

      <nav id="primaryNav" aria-label="Primary navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="aboutus.html">The Team</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="./blog/blog.html">Newsletter</a></li>
        </ul>
      </nav>

      <div class="nav-actions">
        <a class="btn btn-primary" href="contact.html">Contact Us</a>
      </div>
    </div>
  </div>
</header>

  <main class="container">
    <section class="page">
      <h1>Contact Us</h1>
      <p class="lead">Send us a message and we’ll follow up with next steps.</p>

      <form id="contactForm" class="contact-form" action="contact-handler.php" method="POST" novalidate> 

        <div class="grid">
          <label>
            Full Name <span class="req">*</span>
            <input name="name" type="text" autocomplete="name" required maxlength="80" />
            <small class="err" data-err-for="name"></small>
          </label>

          <label>
            Email <span class="req">*</span>
            <input name="email" type="email" autocomplete="email" required maxlength="120" />
            <small class="err" data-err-for="email"></small>
          </label>

          <label>
            Business Phone <span class="req">*</span>
            <input name="phone" type="tel" required autocomplete="tel" maxlength="30" />
          </label>

          <label>
            Company Name <span class="req">*</span>
            <input name="subject" type="text" required maxlength="120" />
            <small class="err" data-err-for="subject"></small>
          </label>
        </div>

        <label>
          Tell Us What You're Looking For: (bookkeeping, payroll, taxes, yearly business planning, and/or  financial consulting) <span class="req">*</span>
          <textarea name="message" rows="6" required maxlength="2000"></textarea>
          <small class="err" data-err-for="message"></small>
        </label>

        <!-- Honeypot anti-spam -->
        <div class="hp">
          <label>Leave this field empty
            <input type="text" name="honeypot" tabindex="-1" autocomplete="off" />
          </label>
        </div>

        <button id="submitBtn" class="btn" type="submit">Send Message</button>

        <p class="fineprint">
          By submitting, you agree we may contact you about your request.
        </p>

        <!-- Status UI -->
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <input type="hidden" name="redirect" value="contact.html">
      </form>
    </section>
  </main>

  <script>
  const statusEl = document.getElementById("status");
  const params = new URLSearchParams(window.location.search);
  const status = params.get("status");

  if (statusEl && status) {
    if (status === "success") {
      statusEl.className = "status success";
      statusEl.textContent = "Thanks! Your message has been sent.";
    } else if (status === "error") {
      statusEl.className = "status error";
      statusEl.textContent = "Sorry—something went wrong. Please try again or contact us directly.";
    }

    // Optional: clean URL
    window.history.replaceState({}, document.title, window.location.pathname);
  }
</script>


  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <script>
  const header = document.getElementById("siteHeader");
  const toggle = document.querySelector(".menu-toggle");

  toggle.addEventListener("click", () => {
    const isOpen = header.classList.toggle("nav-open");
    toggle.setAttribute("aria-expanded", String(isOpen));
  });
  </script>

  <script>
  document.querySelectorAll("#primaryNav a").forEach(a => {
    a.addEventListener("click", () => {
      header.classList.remove("nav-open");
      toggle.setAttribute("aria-expanded", "false");
    });
  });
  </script>
</body>
</html>
